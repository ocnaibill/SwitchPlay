version: "3.8"

services:
  headscale:
    image: headscale/headscale:latest
    container_name: headscale-server
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/data:/var/lib/headscale
    ports:
      - "8080:8080"
      - "9090:9090"
    command: serve
    restart: unless-stopped

  lan-play-server:
    image: spacemeowx2/switch-lan-play
    container_name: switch-lan-play-official
    restart: always
    ports:
      - "11451:11451/udp"
      - "11451:11451/tcp"
